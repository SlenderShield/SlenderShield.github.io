<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect
      // Stores the current path and redirects to /index.html which restores it
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
