[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Supabase URL and anon key are public client config used in Vite bundles.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Forms configuration
[[forms]]
  name = "contact"
  method = "POST"
  fields = [
    { name = "form-name", type = "hidden" },
    { name = "name" },
    { name = "email" },
    { name = "topic" },
    { name = "message" }
  ]
  # Optional: configure where submissions go
  # notifications are sent to your Netlify email by default
